<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>音変化道場 — 英語リスニング基礎トレーニング</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="音変化道場">
<meta name="theme-color" content="#16324f">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
:root{
  --ink:#16324f;
  --paper:#f2f6f9;
  --card:#ffffff;
  --teal:#0e9594;
  --teal-dark:#0a6e6d;
  --coral:#e4572e;
  --gold:#f2b134;
  --line:#d8e2ea;
  --muted:#6b7f92;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;
  background:var(--paper);color:var(--ink);
  min-height:100vh;padding-bottom:70px;
}
header{
  background:var(--ink);color:#fff;padding:calc(14px + env(safe-area-inset-top)) 16px 12px;
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
}
header h1{font-size:17px;font-weight:700;letter-spacing:.03em}
header .xp{
  font-size:12px;background:rgba(255,255,255,.14);border-radius:14px;
  padding:4px 10px;font-weight:600;
}
.wave{display:inline-flex;align-items:flex-end;gap:2px;height:14px;margin-right:6px;vertical-align:-2px}
.wave i{width:3px;background:var(--teal);border-radius:2px;display:block}
.wave i:nth-child(1){height:6px}.wave i:nth-child(2){height:12px}
.wave i:nth-child(3){height:8px}.wave i:nth-child(4){height:14px}.wave i:nth-child(5){height:5px}
main{padding:14px 14px 20px;max-width:640px;margin:0 auto}
.screen{display:none}.screen.on{display:block}
.intro{font-size:13px;color:var(--muted);line-height:1.7;margin:2px 2px 14px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat{
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:13px 12px 11px;cursor:pointer;position:relative;overflow:hidden;
}
.cat:active{transform:scale(.97)}
.cat .ic{font-size:22px;margin-bottom:6px}
.cat .nm{font-size:13.5px;font-weight:700;line-height:1.35;margin-bottom:2px}
.cat .sub{font-size:10.5px;color:var(--muted);line-height:1.4;margin-bottom:8px}
.bar{height:5px;background:#e7eef3;border-radius:3px;overflow:hidden}
.bar b{display:block;height:100%;background:var(--teal);border-radius:3px;transition:width .4s}
.cat .pct{position:absolute;top:11px;right:11px;font-size:10px;color:var(--muted);font-weight:600}
.mixbtn{
  margin-top:12px;width:100%;background:var(--ink);color:#fff;border:none;
  border-radius:14px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;
  font-family:inherit;
}
.mixbtn small{display:block;font-weight:400;font-size:11px;opacity:.75;margin-top:3px}
.back{
  background:none;border:none;color:var(--teal-dark);font-size:14px;font-weight:600;
  padding:4px 0 10px;cursor:pointer;font-family:inherit;
}
.cathead{margin-bottom:10px}
.cathead h2{font-size:19px;font-weight:800;display:flex;align-items:center;gap:8px}
.rule{
  background:#e8f4f4;border:1px solid #bfdedd;border-radius:12px;
  padding:12px 13px;font-size:13px;line-height:1.75;margin:10px 0 12px;
}
.rule b{color:var(--teal-dark)}
.tabs{display:flex;gap:6px;margin-bottom:12px}
.tab{
  flex:1;text-align:center;padding:9px 4px;border-radius:10px;font-size:13px;font-weight:700;
  background:#e7eef3;color:var(--muted);cursor:pointer;border:none;font-family:inherit;
}
.tab.on{background:var(--teal);color:#fff}
.item{
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:12px 13px;margin-bottom:9px;
}
.item .en{font-size:16px;font-weight:600;line-height:1.5;margin-bottom:2px}
.item .en mark{background:#fff3c9;color:inherit;padding:0 2px;border-radius:3px}
.item .kana{font-size:13px;color:var(--coral);font-weight:700;margin:3px 0 1px;display:none}
.item.showk .kana{display:block}
.item .ja{font-size:12px;color:var(--muted);display:none;margin-top:2px}
.item.showj .ja{display:block}
.item .ctr{display:flex;gap:7px;margin-top:9px}
.pbtn{
  border:1px solid var(--line);background:#f6f9fb;border-radius:9px;
  padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--ink);
  cursor:pointer;font-family:inherit;
}
.pbtn.playing{background:var(--teal);color:#fff;border-color:var(--teal)}
.star{margin-left:auto;font-size:14px;align-self:center;color:var(--gold)}
.drill{
  background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px 16px;text-align:center;
}
.drill .prog{font-size:11.5px;color:var(--muted);font-weight:600;margin-bottom:12px}
.bigplay{
  width:84px;height:84px;border-radius:50%;background:var(--teal);color:#fff;
  border:none;font-size:32px;cursor:pointer;margin:6px auto 4px;display:block;
  box-shadow:0 4px 14px rgba(14,149,148,.35);
}
.bigplay:active{transform:scale(.94)}
.slowlink{background:none;border:none;color:var(--teal-dark);font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;padding:6px;margin-bottom:10px}
.cloze{font-size:17px;line-height:1.7;margin:8px 0 14px;font-weight:600}
.cloze u{color:var(--teal-dark);text-decoration:none;border-bottom:2px dashed var(--teal);padding:0 4px;letter-spacing:2px}
.ansin{
  width:100%;padding:12px;font-size:16px;border:2px solid var(--line);border-radius:11px;
  font-family:inherit;text-align:center;outline:none;
}
.ansin:focus{border-color:var(--teal)}
.judge{
  width:100%;margin-top:10px;background:var(--ink);color:#fff;border:none;border-radius:11px;
  padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
}
.result{margin-top:12px;font-size:14px;line-height:1.7;display:none}
.result.on{display:block}
.result .verdict{font-size:19px;font-weight:800;margin-bottom:5px}
.result .verdict.ok{color:var(--teal-dark)}
.result .verdict.ng{color:var(--coral)}
.result .full{background:#f6f9fb;border-radius:10px;padding:10px;margin-top:7px;font-size:14px}
.result .full mark{background:#fff3c9;padding:0 2px;border-radius:3px}
.result .kn{color:var(--coral);font-weight:700;font-size:13px}
.nextb{
  width:100%;margin-top:12px;background:var(--teal);color:#fff;border:none;border-radius:11px;
  padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:none;
}
.nextb.on{display:block}
.choices{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.choice{
  border:2px solid var(--line);background:#fff;border-radius:11px;padding:13px;
  font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;text-align:left;
}
.choice.ok{border-color:var(--teal);background:#e8f4f4}
.choice.ng{border-color:var(--coral);background:#fdeee8}
.choice:disabled{opacity:.9}
.donecard{
  background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:26px 18px;text-align:center;
}
.donecard .big{font-size:38px;margin-bottom:8px}
.donecard h3{font-size:18px;margin-bottom:6px}
.donecard p{font-size:13px;color:var(--muted);line-height:1.7}
.toggler{display:flex;gap:8px;margin:0 0 12px}
.tg{
  flex:1;border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px;
  font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;
}
.tg.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.daily{
  background:linear-gradient(135deg,#16324f,#0e9594);color:#fff;border-radius:14px;
  padding:14px 15px;margin-bottom:12px;cursor:pointer;
}
.daily .dl{font-size:11px;opacity:.85;font-weight:700;letter-spacing:.05em;margin-bottom:4px}
.daily .den{font-size:16px;font-weight:700;line-height:1.5;font-family:Georgia,serif}
.daily .dgo{font-size:12px;margin-top:7px;background:rgba(255,255,255,.18);display:inline-block;border-radius:12px;padding:3px 12px;font-weight:700}
.pstat{display:flex;gap:8px;margin-bottom:12px}
.pstat div{flex:1;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 6px;text-align:center}
.pstat b{display:block;font-size:18px;color:var(--teal-dark)}
.pstat span{font-size:10px;color:var(--muted);font-weight:600}
.shbox{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 15px}
.shnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.shnav button{background:#e7eef3;border:none;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;font-family:inherit}
.shnav .cnt{font-size:12px;color:var(--muted);font-weight:600}
.shsent{font-size:17px;font-weight:600;line-height:1.6;text-align:center;margin:6px 0 2px}
.shsent mark{background:#fff3c9;padding:0 2px;border-radius:3px}
.shkana{text-align:center;color:var(--coral);font-weight:700;font-size:13px;margin-bottom:10px}
.shrow{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin:8px 0}
.spdsel{border:1px solid var(--line);border-radius:9px;padding:7px 8px;font-size:12.5px;font-family:inherit;background:#f6f9fb;font-weight:600}
.recbtn{
  width:100%;margin-top:10px;border:none;border-radius:12px;padding:14px;font-size:15px;
  font-weight:800;cursor:pointer;font-family:inherit;background:var(--coral);color:#fff;
}
.recbtn.rec{background:#b3261e;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.selfcheck{margin-top:14px;border-top:1px dashed var(--line);padding-top:12px;text-align:left}
.selfcheck h4{font-size:13px;margin-bottom:8px}
.checkrow{display:flex;align-items:center;gap:9px;background:#f6f9fb;border-radius:10px;padding:10px 11px;margin-bottom:7px;font-size:13px;font-weight:600;cursor:pointer}
.checkrow input{width:19px;height:19px;accent-color:var(--teal)}
.guide{background:#fbf7ec;border:1px solid #e5d9b8;border-radius:12px;padding:12px 13px;font-size:12.5px;line-height:1.8;margin-bottom:12px}
.guide summary{font-weight:800;cursor:pointer;font-size:13px}
.guide ol{margin:8px 0 0 18px}
.guide li{margin-bottom:4px}
footer{
  position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);
  display:flex;justify-content:space-around;padding:8px 0 max(8px, env(safe-area-inset-bottom));z-index:50;
}
.fbtn{background:none;border:none;font-size:10.5px;color:var(--muted);font-weight:600;cursor:pointer;font-family:inherit;text-align:center;padding:2px 14px}
.fbtn span{display:block;font-size:19px;margin-bottom:1px}
.fbtn.on{color:var(--teal-dark)}
.set-row{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:10px;font-size:13.5px}
.set-row label{font-weight:700;display:block;margin-bottom:7px}
.set-row select,.set-row input[type=range]{width:100%;font-size:14px;padding:8px;border-radius:8px;border:1px solid var(--line);font-family:inherit}
#packIn,#bkArea{width:100%;min-height:110px;border:1px solid var(--line);border-radius:8px;padding:9px;font-size:12px;font-family:ui-monospace,SFMono-Regular,monospace;resize:vertical}
.packrow{display:flex;justify-content:space-between;align-items:center;gap:8px;background:#f6f9fb;border:1px solid var(--line);border-radius:9px;padding:8px 10px;margin-top:7px;font-size:12.5px}
.packrow small{color:var(--muted)}
.packrow button{border:1px solid var(--coral);color:var(--coral);background:none;border-radius:7px;padding:4px 11px;font-size:11.5px;font-family:inherit;cursor:pointer;flex-shrink:0}
/* iPad・大画面 */
@media (min-width:700px){
  main{max-width:900px;padding:20px 24px}
  .grid{grid-template-columns:repeat(3,1fr);gap:14px}
  .cat .nm{font-size:15px}
  .cat .sub{font-size:11.5px}
  .shbox,.drill{max-width:640px;margin:0 auto}
  .daily,.pstat,.mixbtn{max-width:900px}
  body{font-size:15px}
}
@media (min-width:1000px){
  .grid{grid-template-columns:repeat(4,1fr)}
}
.danger{color:var(--coral);background:none;border:1px solid var(--coral);border-radius:10px;padding:10px;width:100%;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px}
.notice{font-size:11.5px;color:var(--muted);line-height:1.7;margin-top:12px}
</style>
</head>
<body>
<header>
  <h1><span class="wave"><i></i><i></i><i></i><i></i><i></i></span>音変化道場</h1>
  <div class="xp">XP <b id="xpVal">0</b></div>
</header>

<main>
  <!-- ホーム -->
  <section class="screen on" id="scr-home">
    <p class="intro">日本人が聞き取れない原因の9割は「知らない単語」ではなく「知っている単語の音の変化」。10のカテゴリを何度も回して、耳の反射を作ろう。</p>
    <div class="daily" id="dailyCard"></div>
    <div class="pstat">
      <div><b id="stToday">0</b><span>今日の練習</span></div>
      <div><b id="stDays">0</b><span>練習した日数</span></div>
      <div><b id="stRecov">0</b><span>復帰回数 🔁</span></div>
    </div>
    <div class="grid" id="catGrid"></div>
    <button class="mixbtn" onclick="startMix()">🔥 実戦ミックステスト<small>全カテゴリから10問ランダム出題(書き取り)</small></button>
  </section>

  <!-- カテゴリ -->
  <section class="screen" id="scr-cat">
    <button class="back" onclick="go('home')">← カテゴリ一覧へ</button>
    <div class="cathead"><h2 id="catTitle"></h2></div>
    <div class="rule" id="catRule"></div>
    <div class="tabs">
      <button class="tab on" data-m="learn" onclick="setMode('learn')">📖 学ぶ</button>
      <button class="tab" data-m="dict" onclick="setMode('dict')">✍️ 書取</button>
      <button class="tab" data-m="quiz" onclick="setMode('quiz')">👂 聞分</button>
      <button class="tab" data-m="shadow" onclick="setMode('shadow')">🎤 シャドー</button>
    </div>
    <div id="catBody"></div>
  </section>

  <!-- 設定 -->
  <section class="screen" id="scr-set">
    <div class="cathead"><h2>⚙️ 設定</h2></div>
    <div class="set-row">
      <label>英語の声</label>
      <select id="voiceSel"></select>
    </div>
    <div class="set-row">
      <label>通常再生の速さ: <span id="rateVal">1.25</span></label>
      <input type="range" id="rateRange" min="0.8" max="1.9" step="0.05" value="1.25">
      <p style="font-size:11px;color:var(--muted);margin-top:5px">iPhone内蔵の読み上げは数値の「1.0」でもゆっくりめです。1.2〜1.4あたりがネイティブの自然な速さの目安。</p>
    </div>
    <div class="set-row">
      <label>💾 バックアップ・引っこし</label>
      <textarea id="bkArea" placeholder="「書き出す」を押すとここにデータが出ます。新しい端末では、保存しておいたデータをここに貼り付けて「読み込む」を押してね"></textarea>
      <div style="display:flex;gap:7px;margin-top:8px;flex-wrap:wrap">
        <button class="pbtn" onclick="bkExport()">📤 書き出す</button>
        <button class="pbtn" onclick="bkCopy()">📋 コピー</button>
        <button class="pbtn" onclick="bkShare()">✈️ ファイルで共有</button>
      </div>
      <button class="judge" style="margin-top:8px" onclick="bkImport()">📥 貼り付けたデータを読み込む</button>
      <p style="font-size:11px;color:var(--muted);margin-top:7px;line-height:1.6">※ XP・★・練習記録・教材パックがまるごと保存されます。読み込むと今の記録は置き換わります。</p>
    </div>
    <div class="set-row">
      <label>📦 教材パック(JSONを貼り付け)</label>
      <textarea id="packIn" placeholder='先生から配布されたJSONをここに貼り付けて「追加」を押してね'></textarea>
      <button class="judge" style="margin-top:8px" onclick="addPack()">パックを追加 / 更新する</button>
      <div id="packList"></div>
    </div>
    <div class="set-row">
      <label>学習記録</label>
      <div style="font-size:13px;color:var(--muted);line-height:1.7" id="statText"></div>
      <button class="danger" onclick="resetProgress()">記録をリセットする</button>
    </div>
    <p class="notice">※ 音声はiPhone内蔵の読み上げ(TTS)を使用。音が出ないときはマナーモードを解除してください。記録はこの端末のブラウザ内にのみ保存されます。</p>
  </section>
</main>

<footer>
  <button class="fbtn on" id="fb-home" onclick="go('home')"><span>🏠</span>ホーム</button>
  <button class="fbtn" id="fb-set" onclick="go('set')"><span>⚙️</span>設定</button>
</footer>

<script>
/* ================= データ =================
   items: en=読み上げ文 / f=焦点フレーズ / k=カナ近似 / ja=意味 / pair=聞き分けペア(任意)
   カテゴリを増やす場合はこの配列に追記するだけでOK */
const BASE_CATS=[
{id:"link",ic:"🔗",name:"連結(リンキング)",sub:"子音+母音がつながる",
 rule:"単語の最後の<b>子音</b>と次の単語の<b>母音</b>がつながって1語のように聞こえる。<b>check it out → チェッキラウッ</b>。英語は単語ごとに切って発音されない、がすべての出発点。",
 items:[
 {en:"Check it out.",f:"check it out",k:"チェッキラウッ",ja:"ちょっと見てみて。"},
 {en:"Take it easy.",f:"take it easy",k:"テイキリーズィ",ja:"気楽にね。"},
 {en:"Turn it on.",f:"turn it on",k:"ターニロン",ja:"電源を入れて。"},
 {en:"Think about it.",f:"think about it",k:"シンカバウリッ",ja:"考えてみて。"},
 {en:"Come on in.",f:"come on in",k:"カモニン",ja:"どうぞ入って。"},
 {en:"Pick it up.",f:"pick it up",k:"ピッキラップ",ja:"拾って。/ 迎えに行くよ。"},
 {en:"That was an hour ago.",f:"an hour ago",k:"アナワラゴウ",ja:"それは1時間前だよ。"},
 {en:"Look at this.",f:"look at this",k:"ルッカッディス",ja:"これを見て。"},
 {en:"Hold on a second.",f:"hold on a second",k:"ホウルドナセカン",ja:"ちょっと待って。"},
 {en:"You'll find it on your left.",f:"find it on your left",k:"ファインディロニョアレフト",ja:"左手に見えますよ。(第1回 問11)"}
]},
{id:"drop",ic:"✂️",name:"脱落(t・dが消える)",sub:"語末の音が発音されない",
 rule:"<b>t / d</b> などの音は、次に子音が来ると<b>ほぼ消える</b>。<b>next week → ネクス(ト)ウィーク</b>。「聞こえなかった音」は最初から発音されていない。",
 items:[
 {en:"See you next week.",f:"next week",k:"ネクスウィーク",ja:"また来週。"},
 {en:"It must be true.",f:"must be",k:"マスビー",ja:"本当に違いない。"},
 {en:"I don't know.",f:"don't know",k:"ドンノウ",ja:"わからない。"},
 {en:"Exactly!",f:"exactly",k:"イグザクリ",ja:"その通り!"},
 {en:"She just left.",f:"just left",k:"ジャスレフト",ja:"彼女はちょうど出たところ。"},
 {en:"I want a sandwich.",f:"sandwich",k:"サンウィッチ",ja:"サンドイッチがほしい。"},
 {en:"We kept talking.",f:"kept talking",k:"ケプトーキング",ja:"私たちは話し続けた。"},
 {en:"Last night was fun.",f:"last night",k:"ラスナイッ",ja:"昨夜は楽しかった。"},
 {en:"He's my best friend.",f:"best friend",k:"ベスフレン",ja:"彼は親友だ。"},
 {en:"I asked him twice.",f:"asked",k:"アスト",ja:"2回たずねた。(askedのkも弱まる)"}

/* ================= 状態 ================= */
let CATS=BASE_CATS.slice();
const KEY="onhenka_dojo_v1";
let S=load();
function load(){
  let s;try{s=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){s={}}
  return Object.assign({xp:0,rec:{},rate:1.25,voice:"",days:{},recov:0,packs:[]},s);
}
function getPackCats(){
  return (S.packs||[]).map(p=>({
    id:"pk_"+p.id, ic:p.ic||"📦", name:p.name,
    sub:p.sub||"先生が配布した教材パック",
    rule:p.rule||"先生が配布した<b>教材パック</b>です。授業で扱った文を耳の反射になるまで回そう。",
    items:p.items
  }));
}
function rebuildCats(){CATS=BASE_CATS.slice();CATS.push(...getPackCats());}
function today(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function logPractice(){
  const t=today();
  const keys=Object.keys(S.days).sort();
  if(!S.days[t]){
    const last=keys[keys.length-1];
    if(last){
      const gap=Math.round((new Date(t)-new Date(last))/86400000);
      if(gap>=2)S.recov++; // サボり明けに戻ってきたら復帰カウント+1
    }
    S.days[t]=0;
  }
  S.days[t]++;save();
}
function save(){localStorage.setItem(KEY,JSON.stringify(S))}
function rec(id){return S.rec[id]||(S.rec[id]={c:0,t:0})}
function itemId(ci,ii){return CATS[ci].id+"_"+ii}
function mastered(id){const r=S.rec[id];return r&&r.c>=2}

/* ================= TTS ================= */
let VOICES=[];
function loadVoices(){
  VOICES=speechSynthesis.getVoices().filter(v=>v.lang.startsWith("en"));
  const sel=document.getElementById("voiceSel");
  sel.innerHTML=VOICES.map((v,i)=>`<option value="${i}">${v.name} (${v.lang})</option>`).join("");
  if(S.voice){const i=VOICES.findIndex(v=>v.name===S.voice);if(i>=0)sel.value=i;}
  else{
    const pref=["Samantha","Karen","Daniel","Google US English","Google UK English Female"];
    for(const p of pref){const i=VOICES.findIndex(v=>v.name.includes(p));if(i>=0){sel.value=i;break;}}
  }
}
speechSynthesis.onvoiceschanged=loadVoices;
function speak(text,slow,btn){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  const vi=document.getElementById("voiceSel").value;
  if(VOICES[vi])u.voice=VOICES[vi];
  u.lang="en-US";
  u.rate=slow?0.6:(S.rate||1.25);
  if(btn){btn.classList.add("playing");u.onend=()=>btn.classList.remove("playing");u.onerror=()=>btn.classList.remove("playing");}
  speechSynthesis.speak(u);
}

/* ================= 画面遷移 ================= */
function go(s){
  document.querySelectorAll(".screen").forEach(e=>e.classList.remove("on"));
  document.getElementById("scr-"+s).classList.add("on");
  document.getElementById("fb-home").classList.toggle("on",s==="home");
  document.getElementById("fb-set").classList.toggle("on",s==="set");
  if(s==="home")renderHome();
  if(s==="set")renderStats();
  window.scrollTo(0,0);
}

/* ================= ホーム ================= */
function catProgress(ci){
  const n=CATS[ci].items.length;
  let m=0;for(let i=0;i<n;i++)if(mastered(itemId(ci,i)))m++;
  return Math.round(m/n*100);
}
function dailyPick(){
  const t=today();let h=0;for(const ch of t)h=(h*31+ch.charCodeAt(0))>>>0;
  const all=[];CATS.forEach((c,ci)=>c.items.forEach((it,ii)=>all.push({ci,ii})));
  return all[h%all.length];
}
function renderHome(){
  document.getElementById("xpVal").textContent=S.xp;
  const dp=dailyPick(),dit=CATS[dp.ci].items[dp.ii];
  document.getElementById("dailyCard").innerHTML=
    `<div class="dl">📅 今日の1文 — ${CATS[dp.ci].name}</div>
     <div class="den">${esc(dit.en)}</div>
     <div class="dgo">🎤 シャドーイングする →</div>`;
  document.getElementById("dailyCard").onclick=()=>{openCat(dp.ci);setMode("shadow");SHI=dp.ii;renderBody();};
  document.getElementById("stToday").textContent=S.days[today()]||0;
  document.getElementById("stDays").textContent=Object.keys(S.days).length;
  document.getElementById("stRecov").textContent=S.recov;
  const g=document.getElementById("catGrid");
  g.innerHTML=CATS.map((c,ci)=>{
    const p=catProgress(ci);
    return `<div class="cat" onclick="openCat(${ci})">
      <div class="pct">${p}%</div>
      <div class="ic">${c.ic}</div>
      <div class="nm">${c.name}</div>
      <div class="sub">${c.sub}</div>
      <div class="bar"><b style="width:${p}%"></b></div>
    </div>`;
  }).join("");
}

/* ================= カテゴリ ================= */
let CUR=0, MODE="learn", SHOWK=true, SHOWJ=true;
function openCat(ci){
  CUR=ci;MODE="learn";
  document.getElementById("catTitle").innerHTML=CATS[ci].ic+" "+CATS[ci].name;
  document.getElementById("catRule").innerHTML=CATS[ci].rule;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.m==="learn"));
  renderBody();go("cat");
}
function setMode(m){
  MODE=m;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.m===m));
  renderBody();
}
function renderBody(){
  const b=document.getElementById("catBody");
  if(MODE==="learn")renderLearn(b);
  else if(MODE==="dict")startDrill(b,"dict");
  else if(MODE==="quiz")startDrill(b,"quiz");
  else renderShadow(b);
}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;")}
function markFocus(en,f){
  const i=en.toLowerCase().indexOf(f.toLowerCase());
  if(i<0)return esc(en);
  return esc(en.slice(0,i))+"<mark>"+esc(en.slice(i,i+f.length))+"</mark>"+esc(en.slice(i+f.length));
}
function renderLearn(b){
  const c=CATS[CUR];
  b.innerHTML=`<div class="toggler">
    <button class="tg ${SHOWK?"on":""}" onclick="SHOWK=!SHOWK;renderBody()">カナ表示</button>
    <button class="tg ${SHOWJ?"on":""}" onclick="SHOWJ=!SHOWJ;renderBody()">意味表示</button>
  </div>`+c.items.map((it,ii)=>{
    const id=itemId(CUR,ii);
    return `<div class="item ${SHOWK?"showk":""} ${SHOWJ?"showj":""}">
      <div class="en">${markFocus(it.en,it.f)}</div>
      <div class="kana">${it.k}</div>
      <div class="ja">${it.ja}</div>
      <div class="ctr">
        <button class="pbtn" onclick="speak('${it.en.replace(/'/g,"\\'")}',false,this)">▶ 再生</button>
        <button class="pbtn" onclick="speak('${it.en.replace(/'/g,"\\'")}',true,this)">🐢 ゆっくり</button>
        ${mastered(id)?'<span class="star">★</span>':''}
      </div>
    </div>`;
  }).join("");
}

/* ================= ドリル(書き取り/聞き分け) ================= */
let Q=[],QI=0,QOK=0,QKIND="dict",MIX=false;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function startDrill(container,kind){
  QKIND=kind;MIX=false;
  Q=shuffle(CATS[CUR].items.map((it,ii)=>({...it,ci:CUR,ii}))).slice(0,5);
  QI=0;QOK=0;
  renderQ(container);
}
function startMix(){
  QKIND="dict";MIX=true;
  const all=[];CATS.forEach((c,ci)=>c.items.forEach((it,ii)=>all.push({...it,ci,ii})));
  Q=shuffle(all).slice(0,10);QI=0;QOK=0;
  openMixScreen();
}
function openMixScreen(){
  CUR=-1;
  document.getElementById("catTitle").innerHTML="🔥 実戦ミックステスト";
  document.getElementById("catRule").innerHTML="全カテゴリから10問。<b>音声を聞いて空欄を書き取る</b>。本番と同じく、まず聞いてから考える。";
  document.querySelector(".tabs").style.display="none";
  renderQ(document.getElementById("catBody"));
  go("cat");
}
function normalize(s){return s.toLowerCase().replace(/[.,!?'"‘’]/g,"").replace(/\s+/g," ").trim()}
function renderQ(container){
  if(CUR>=0)document.querySelector(".tabs").style.display="flex";
  if(QI>=Q.length){renderDone(container);return}
  const q=Q[QI];
  if(QKIND==="dict"){
    const cloze=markFocusCloze(q.en,q.f);
    container.innerHTML=`<div class="drill">
      <div class="prog">${QI+1} / ${Q.length} 問 ${MIX?("["+CATS[q.ci].name+"]"):""}</div>
      <button class="bigplay" onclick="speak('${q.en.replace(/'/g,"\\'")}',false,null)">▶</button>
      <button class="slowlink" onclick="speak('${q.en.replace(/'/g,"\\'")}',true,null)">🐢 ゆっくり聞く</button>
      <div class="cloze">${cloze}</div>
      <input class="ansin" id="ansIn" placeholder="空欄の英語を入力" autocomplete="off" autocapitalize="off">
      <button class="judge" onclick="judgeDict()">答え合わせ</button>
      <div class="result" id="res"></div>
      <button class="nextb" id="nextB" onclick="nextQ()">次へ →</button>
    </div>`;
    setTimeout(()=>speak(q.en,false,null),300);
  }else{
    const pool=CATS[q.ci].items.filter(x=>x.f!==q.f);
    let ds=shuffle([...pool]).slice(0,3).map(x=>x.f);
    if(q.pair && !ds.includes(q.pair)){ds[0]=q.pair;}
    const choices=shuffle([q.f,...ds]);
    container.innerHTML=`<div class="drill">
      <div class="prog">${QI+1} / ${Q.length} 問</div>
      <button class="bigplay" onclick="speak('${q.en.replace(/'/g,"\\'")}',false,null)">▶</button>
      <button class="slowlink" onclick="speak('${q.en.replace(/'/g,"\\'")}',true,null)">🐢 ゆっくり聞く</button>
      <p style="font-size:13px;color:var(--muted);margin-bottom:4px">聞こえたフレーズはどれ?</p>
      <div class="choices">${choices.map(c=>`<button class="choice" onclick="judgeQuiz(this,'${c.replace(/'/g,"\\'")}')">${esc(c)}</button>`).join("")}</div>
      <div class="result" id="res"></div>
      <button class="nextb" id="nextB" onclick="nextQ()">次へ →</button>
    </div>`;
    setTimeout(()=>speak(q.en,false,null),300);
  }
}
function markFocusCloze(en,f){
  const i=en.toLowerCase().indexOf(f.toLowerCase());
  if(i<0)return esc(en);
  const blank="<u>"+"＿".repeat(Math.min(8,Math.max(3,Math.round(f.length/2))))+"</u>";
  return esc(en.slice(0,i))+blank+esc(en.slice(i+f.length));
}
function judgeDict(){
  const q=Q[QI];
  const ans=normalize(document.getElementById("ansIn").value);
  const ok=ans===normalize(q.f);
  showResult(q,ok);
}
function judgeQuiz(btn,picked){
  const q=Q[QI];
  const ok=picked===q.f;
  document.querySelectorAll(".choice").forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.f)b.classList.add("ok");
    else if(b===btn&&!ok)b.classList.add("ng");
  });
  showResult(q,ok);
}
function showResult(q,ok){
  const id=itemId(q.ci,q.ii);const r=rec(id);
  r.t++;if(ok){r.c++;S.xp+=10;QOK++;}
  save();document.getElementById("xpVal").textContent=S.xp;
  const res=document.getElementById("res");
  res.innerHTML=`<div class="verdict ${ok?"ok":"ng"}">${ok?"⭕ 正解! +10XP":"✖ おしい!"}</div>
    <div class="full">${markFocus(q.en,q.f)}<br><span class="kn">${q.k}</span><br><span style="color:var(--muted);font-size:12.5px">${q.ja}</span></div>`;
  res.classList.add("on");
  document.getElementById("nextB").classList.add("on");
  const jd=document.querySelector(".judge");if(jd)jd.style.display="none";
  const ai=document.getElementById("ansIn");if(ai)ai.disabled=true;
}
function nextQ(){QI++;renderQ(document.getElementById("catBody"))}
function renderDone(container){
  const pct=Math.round(QOK/Q.length*100);
  container.innerHTML=`<div class="donecard">
    <div class="big">${pct===100?"🏆":pct>=70?"🎉":"💪"}</div>
    <h3>${QOK} / ${Q.length} 問正解</h3>
    <p>${pct===100?"完璧!この音はもう耳の反射になっている。":pct>=70?"いい調子。間違えた文だけ「学ぶ」タブでシャドーイングしよう。":"音変化は「知る→聞く→真似る」の3周で必ず取れるようになる。学ぶタブに戻って音を確認しよう。"}</p>
    <button class="mixbtn" onclick="${MIX?"startMix()":"renderBody()"}">もう一度挑戦</button>
    <button class="back" style="margin-top:10px" onclick="go('home')">ホームに戻る</button>
  </div>`;
}

/* ================= シャドーイング ================= */
let SHI=0, recStream=null, recorder=null, recChunks=[], recBlob=null, recURL=null, isRec=false;
const CHECKS=[
  "焦点フレーズの<b>音変化を再現</b>できた(カナ表記の音になっている)",
  "お手本の<b>スピードに遅れず</b>ついていけた",
  "最後まで<b>止まらずに</b>言い切れた"
];
function renderShadow(b){
  const c=CATS[CUR];if(SHI>=c.items.length)SHI=0;
  const it=c.items[SHI];
  b.innerHTML=`
  <details class="guide"><summary>🥋 シャドーイングの正しい手順(最初に読む)</summary>
    <ol>
      <li><b>聞く</b>:何も見ずに2回聞き、意味と音の流れをつかむ</li>
      <li><b>オーバーラッピング</b>:文を見ながら音声と同時に読む(2〜3回)</li>
      <li><b>シャドーイング</b>:文を見ずに、聞こえた0.5秒後を影のように追いかける</li>
      <li><b>録音して聞き比べ</b>:お手本と自分の差を「音変化ができているか」で確認する</li>
      <li><b>セルフ添削</b>:下のチェック3項目で自己評価。できなかった項目だけ意識してもう1回</li>
    </ol>
    聞こえていない音は、聞こえていないこと自体に気づけない。だから録音して<b>自分の耳で添削</b>する。
  </details>
  <div class="shbox">
    <div class="shnav">
      <button onclick="SHI=(SHI-1+${c.items.length})%${c.items.length};stopAllRec();renderShadow(document.getElementById('catBody'))">← 前</button>
      <span class="cnt">${SHI+1} / ${c.items.length}</span>
      <button onclick="SHI=(SHI+1)%${c.items.length};stopAllRec();renderShadow(document.getElementById('catBody'))">次 →</button>
    </div>
    <div class="shsent">${markFocus(it.en,it.f)}</div>
    <div class="shkana">${it.k}</div>
    <div class="shrow">
      <select class="spdsel" id="shRate">
        <option value="0.6">🐢 0.6倍</option>
        <option value="0.8">0.8倍</option>
        <option value="1.0">1.0倍</option>
        <option value="1.25" selected>▶ 1.25倍(標準)</option>
        <option value="1.5">1.5倍</option>
      </select>
      <button class="pbtn" onclick="shSpeak(1)">▶ お手本</button>
      <button class="pbtn" onclick="shSpeak(3)">🔁 3回連続</button>
    </div>
    <button class="recbtn" id="recBtn" onclick="toggleRec()">🎤 録音してシャドーイング</button>
    <div class="shrow" id="recRow" style="display:none">
      <button class="pbtn" onclick="playRec()">🗣 自分の声</button>
      <button class="pbtn" onclick="compareRec()">⚖️ お手本→自分</button>
      <button class="pbtn" onclick="shareRec()">📤 先生に提出</button>
    </div>
    <audio id="recAudio" style="display:none"></audio>
    <div class="selfcheck" id="selfCheck" style="display:none">
      <h4>✅ セルフ添削(できたら✓)</h4>
      ${CHECKS.map((t,i)=>`<label class="checkrow"><input type="checkbox" id="ck${i}">${t}</label>`).join("")}
      <button class="judge" onclick="finishShadow()">添削を記録する(✓×5XP)</button>
      <div class="result" id="shRes"></div>
    </div>
  </div>`;
}
function shSpeak(times){
  const it=CATS[CUR].items[SHI];
  const rate=parseFloat(document.getElementById("shRate").value);
  speechSynthesis.cancel();let n=0;
  const one=()=>{
    const u=new SpeechSynthesisUtterance(it.en);
    const vi=document.getElementById("voiceSel").value;
    if(VOICES[vi])u.voice=VOICES[vi];
    u.lang="en-US";u.rate=rate;
    u.onend=()=>{n++;if(n<times)setTimeout(one,700)};
    speechSynthesis.speak(u);
  };one();
}
async function toggleRec(){
  const btn=document.getElementById("recBtn");
  if(isRec){recorder.stop();isRec=false;btn.textContent="🎤 録音してシャドーイング";btn.classList.remove("rec");return}
  try{recStream=await navigator.mediaDevices.getUserMedia({audio:true})}
  catch(e){alert("マイクの使用を許可してください(設定 > Safari > マイク)");return}
  recChunks=[];
  let mime="";
  if(window.MediaRecorder){
    if(MediaRecorder.isTypeSupported("audio/mp4"))mime="audio/mp4";
    else if(MediaRecorder.isTypeSupported("audio/webm"))mime="audio/webm";
  }else{alert("この端末は録音に対応していません");return}
  recorder=mime?new MediaRecorder(recStream,{mimeType:mime}):new MediaRecorder(recStream);
  recorder.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data)};
  recorder.onstop=()=>{
    recBlob=new Blob(recChunks,{type:recorder.mimeType||"audio/mp4"});
    if(recURL)URL.revokeObjectURL(recURL);
    recURL=URL.createObjectURL(recBlob);
    document.getElementById("recAudio").src=recURL;
    document.getElementById("recRow").style.display="flex";
    document.getElementById("selfCheck").style.display="block";
    recStream.getTracks().forEach(t=>t.stop());
  };
  recorder.start();isRec=true;
  btn.textContent="⏹ 録音を止める";btn.classList.add("rec");
  shSpeak(1); // お手本を流しながら影で追いかける
}
function stopAllRec(){
  if(isRec&&recorder){recorder.stop();isRec=false}
  speechSynthesis.cancel();
}
function playRec(){document.getElementById("recAudio").play()}
function compareRec(){
  const it=CATS[CUR].items[SHI];
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(it.en);
  const vi=document.getElementById("voiceSel").value;
  if(VOICES[vi])u.voice=VOICES[vi];
  u.lang="en-US";u.rate=parseFloat(document.getElementById("shRate").value);
  u.onend=()=>setTimeout(()=>document.getElementById("recAudio").play(),400);
  speechSynthesis.speak(u);
}
async function shareRec(){
  if(!recBlob)return;
  const ext=(recBlob.type||"").includes("webm")?"webm":"m4a";
  const it=CATS[CUR].items[SHI];
  const name=`shadow_${today()}_${CATS[CUR].id}${SHI+1}.${ext}`;
  const file=new File([recBlob],name,{type:recBlob.type});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file],title:"シャドーイング提出",text:it.en})}catch(e){}
  }else{
    const a=document.createElement("a");a.href=recURL;a.download=name;a.click();
    alert("録音を保存しました。LINEやフォームから先生に送ってください。");
  }
}
function finishShadow(){
  const it=CATS[CUR].items[SHI];
  const n=CHECKS.reduce((s,_,i)=>s+(document.getElementById("ck"+i).checked?1:0),0);
  S.xp+=n*5;logPractice();save();
  document.getElementById("xpVal").textContent=S.xp;
  const res=document.getElementById("shRes");
  res.innerHTML=`<div class="verdict ${n===3?"ok":""}">${n===3?"⭕ 3項目クリア!":"📝 記録しました"} +${n*5}XP</div>
    <div class="full">${n===3?"次の文へ進もう。":"✓がつかなかった項目だけ意識して、もう一度🎤を押そう。同じ文を2〜3回やるのが一番伸びる。"}</div>`;
  res.classList.add("on");
}

/* ================= バックアップ ================= */
function bkExport(){
  const j={app:"onhenka-dojo",v:2,exported:new Date().toISOString(),data:S};
  document.getElementById("bkArea").value=JSON.stringify(j);
}
function bkCopy(){
  const a=document.getElementById("bkArea");
  if(!a.value)bkExport();
  a.focus();a.select();a.setSelectionRange(0,9999999);
  const done=()=>alert("📋 コピーしました!メモアプリやLINEの自分用トークに貼って保存してね");
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(a.value).then(done).catch(()=>{document.execCommand("copy");done()});
  }else{document.execCommand("copy");done();}
}
async function bkShare(){
  bkExport();
  const v=document.getElementById("bkArea").value;
  const name=`onhenka-backup_${today()}.json`;
  const f=new File([v],name,{type:"application/json"});
  if(navigator.canShare&&navigator.canShare({files:[f]})){
    try{await navigator.share({files:[f],title:"音変化道場バックアップ"})}catch(e){}
  }else{
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([v],{type:"application/json"}));
    a.download=name;a.click();
    alert("ファイルを保存しました。新しい端末に送っておいてね");
  }
}
function bkImport(){
  const t=document.getElementById("bkArea").value.trim();
  if(!t){alert("バックアップデータを貼り付けてから押してください");return}
  let j;try{j=JSON.parse(t)}catch(e){alert("データの形式にエラーがあります:\n"+e.message);return}
  const d=(j&&j.app==="onhenka-dojo"&&j.data)?j.data
        :(j&&j.rec&&typeof j.xp!=="undefined")?j:null;
  if(!d){alert("音変化道場のバックアップデータではないようです");return}
  if(!confirm(`このバックアップで置き換えます。\nXP: ${d.xp||0} / パック: ${(d.packs||[]).length}個\nよろしいですか?`))return;
  S=Object.assign({xp:0,rec:{},rate:1.0,voice:"",days:{},recov:0,packs:[]},d);
  save();rebuildCats();renderStats();renderHome();
  document.getElementById("xpVal").textContent=S.xp;
  document.getElementById("bkArea").value="";
  alert("✅ 読み込みました!おかえりなさい。");
}

/* ================= 教材パック ================= */
function addPack(){
  const t=document.getElementById("packIn").value.trim();
  if(!t){alert("JSONを貼り付けてください");return}
  let data;
  try{data=JSON.parse(t)}catch(e){alert("JSONの形式にエラーがあります:\n"+e.message);return}
  const arr=Array.isArray(data)?data:[data];
  const errs=[];let added=0;
  arr.forEach((p,i)=>{
    if(!p||!p.id||!p.name||!Array.isArray(p.items)){errs.push(`${i+1}個目: id / name / items が必要です`);return}
    if(p.items.length<4){errs.push(`${p.name}: itemsは4文以上必要です(聞き分けの4択のため)`);return}
    const noEnF=p.items.find(it=>!it.en||!it.f);
    if(noEnF){errs.push(`${p.name}: en(文)と f(焦点フレーズ)が無い項目があります`);return}
    const fbad=p.items.filter(it=>it.en.toLowerCase().indexOf(it.f.toLowerCase())<0);
    if(fbad.length){errs.push(`${p.name}: 「${fbad[0].f}」が en の文中に見つかりません(大文字小文字以外は完全一致が必要)`);return}
    p.items.forEach(it=>{it.k=it.k||"";it.ja=it.ja||""});
    S.packs=S.packs||[];
    const ex=S.packs.findIndex(x=>x.id===p.id);
    if(ex>=0)S.packs[ex]=p;else S.packs.push(p);
    added++;
  });
  save();rebuildCats();renderPacks();
  if(added)document.getElementById("packIn").value="";
  alert((added?`✅ ${added}個のパックを追加/更新しました!ホームに表示されます。`:"追加できませんでした")+(errs.length?"\n\n⚠️ "+errs.join("\n"):""));
}
function delPack(i){
  if(confirm(`「${S.packs[i].name}」を削除しますか?`)){
    S.packs.splice(i,1);save();rebuildCats();renderPacks();
  }
}
function renderPacks(){
  const el=document.getElementById("packList");if(!el)return;
  el.innerHTML=(S.packs&&S.packs.length)
    ?S.packs.map((p,i)=>`<div class="packrow"><span>${p.ic||"📦"} ${p.name} <small>(${p.items.length}文)</small></span><button onclick="delPack(${i})">削除</button></div>`).join("")
    :'<div style="font-size:12px;color:var(--muted);margin-top:7px">まだパックはありません。先生から配布されたJSONを上に貼り付けてね。</div>';
}

/* ================= 設定 ================= */
document.getElementById("rateRange").addEventListener("input",e=>{
  S.rate=parseFloat(e.target.value);
  document.getElementById("rateVal").textContent=S.rate.toFixed(2);
  save();
});
document.getElementById("voiceSel").addEventListener("change",e=>{
  const v=VOICES[e.target.value];if(v){S.voice=v.name;save();}
  speak("This is a test. Check it out.",false,null);
});
function renderStats(){
  document.getElementById("rateRange").value=S.rate||1.25;
  document.getElementById("rateVal").textContent=(S.rate||1.25).toFixed(2);
  let m=0,total=0;
  CATS.forEach((c,ci)=>c.items.forEach((it,ii)=>{total++;if(mastered(itemId(ci,ii)))m++;}));
  document.getElementById("statText").innerHTML=
    `習得(★)フレーズ: <b>${m} / ${total}</b><br>累計XP: <b>${S.xp}</b><br>※2回以上正解したフレーズに★がつきます。`;

  loadVoices();
}
function resetProgress(){
  if(confirm("学習記録(XP・★)をすべて消去します。よろしいですか?")){
    S={xp:0,rec:{},rate:S.rate,voice:S.voice};save();renderStats();renderHome();
  }
}

loadVoices();
rebuildCats();
renderHome();
// PWA: オフライン起動用サービスワーカー
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js").catch(()=>{});
}
